<script>
    let currentStep = 1;
    let selections = { q1: null, q2: null, q3: null };
    
    // 로컬 저장소에서 데이터를 가져오거나 없으면 초기값 설정
    let savedData = JSON.parse(localStorage.getItem('surveyStats')) || { offline: 14, chatbot: 19, reason0: 10, reason1: 16, reason2: 7 };

    const reasons = {
        offline: ["따뜻한 공감과 위로 때문", "직접 대화가 더 믿음직해서", "즉각적인 반응을 볼 수 있어서"],
        chatbot: ["판단받지 않아 마음이 편해서", "익명이라 창피하지 않아서", "언제든 바로 말할 수 있어서"]
    };

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        currentStep = step;
        document.getElementById('step-indicator').innerText = step + ' / 5';
        document.getElementById('progress-fill').style.width = (step * 20) + '%';
        if(step === 4) renderReasons();
        if(step === 5) showResults();
    }

    function selectOption(q, val) {
        selections[q] = val;
        const buttons = document.querySelectorAll('.' + q + '-opt');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        const nextBtn = document.getElementById('next' + currentStep);
        if(nextBtn) {
            nextBtn.disabled = false;
            nextBtn.classList.replace('bg-slate-200', 'bg-indigo-600');
            nextBtn.classList.replace('text-slate-400', 'text-white');
        }
    }

    function renderReasons() {
        const container = document.getElementById('reason-container');
        container.innerHTML = '';
        reasons[selections.q1].forEach((text, idx) => {
            const btn = document.createElement('button');
            btn.className = 'q3-opt btn-select w-full p-4 text-left bg-white rounded-xl shadow-sm border border-slate-100 text-sm';
            btn.innerText = text;
            btn.onclick = () => selectOption('q3', idx);
            container.appendChild(btn);
        });
    }

    function showResults() {
        // 데이터 누적 및 저장
        savedData[selections.q1]++;
        savedData['reason' + selections.q3]++;
        localStorage.setItem('surveyStats', JSON.stringify(savedData));

        document.getElementById('total-count').innerText = savedData.offline + savedData.chatbot;

        new Chart(document.getElementById('resultChart1'), {
            type: 'doughnut',
            data: {
                labels: ['대면', '챗봇'],
                datasets: [{ data: [savedData.offline, savedData.chatbot], backgroundColor: ['#3b82f6', '#a855f7'], borderWidth: 0 }]
            },
            options: { cutout: '65%', plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } } }
        });

        new Chart(document.getElementById('resultChart2'), {
            type: 'bar',
            data: {
                labels: reasons[selections.q1],
                datasets: [{
                    label: '선택 인원',
                    data: [savedData.reason0, savedData.reason1, savedData.reason2],
                    backgroundColor: selections.q1 === 'offline' ? '#93c5fd' : '#d8b4fe',
                    borderRadius: 8
                }]
            },
            options: {
                indexAxis: 'y',
                scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
