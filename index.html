<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 진단: 대면 vs 챗봇 상담 선호도 조사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-select { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .btn-select.active { border-color: #6366f1; background-color: #eef2ff; transform: scale(1.02); }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md mt-6 mb-8">
        <div class="flex justify-between items-end mb-2">
            <h1 class="text-xl font-extrabold gradient-text">Mind Survey</h1>
            <span id="step-indicator" class="text-sm font-medium text-slate-400">1 / 5</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 20%;"></div>
        </div>
    </div>

    <main class="w-full max-w-md flex-grow">
        <div id="step1" class="step active glass-card p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-comments text-3xl text-indigo-600"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">진솔한 마음, 어디에?</h2>
                <p class="text-slate-500 text-sm leading-relaxed">
                    의과학 수업 중 궁금해진 질문!<br>우리는 누구에게 더 정직하게 고민을 말할까요?<br><br>친구들의 답변은 익명으로 처리되어<br>AI 질병 예측 모델 연구의 기초가 됩니다.
                </p>
            </div>
            <button onclick="nextStep(2)" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">설문 시작하기</button>
        </div>

        <div id="step2" class="step glass-card p-8">
            <h3 class="text-xl font-bold mb-6 text-center">어떤 방식의 상담이<br>더 <span class="text-indigo-600">편안함</span>을 느끼나요?</h3>
            <div class="space-y-4">
                <button onclick="selectOption('q1', 'offline')" class="q1-opt btn-select w-full p-5 text-left bg-white rounded-2xl shadow-sm flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500"><i class="fa-solid fa-user-doctor"></i></div>
                    <div><div class="font-bold">대면 상담 (사람)</div><div class="text-xs text-slate-400">눈을 맞추고 나누는 대화</div></div>
                </button>
                <button onclick="selectOption('q1', 'chatbot')" class="q1-opt btn-select w-full p-5 text-left bg-white rounded-2xl shadow-sm flex items-center gap-4">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-500"><i class="fa-solid fa-robot"></i></div>
                    <div><div class="font-bold">챗봇/AI 상담</div><div class="text-xs text-slate-400">부담 없는 텍스트 대화</div></div>
                </button>
            </div>
            <button onclick="nextStep(3)" id="next2" disabled class="w-full mt-8 py-4 bg-slate-200 text-slate-400 rounded-2xl font-bold transition-all">다음</button>
        </div>

        <div id="step3" class="step glass-card p-8">
            <h3 class="text-xl font-bold mb-6 text-center">나의 <span class="text-red-500">부끄러운 습관</span>을<br>말해야 한다면 누구에게 더 솔직할까요?</h3>
            <div class="space-y-4">
                <button onclick="selectOption('q2', 'offline')" class="q2-opt btn-select w-full p-5 text-left bg-white rounded-2xl shadow-sm flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500"><i class="fa-solid fa-user-md"></i></div>
                    <div class="font-bold">그래도 의사에게 직접 말한다</div>
                </button>
                <button onclick="selectOption('q2', 'chatbot')" class="q2-opt btn-select w-full p-5 text-left bg-white rounded-2xl shadow-sm flex items-center gap-4">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-500"><i class="fa-solid fa-comment-dots"></i></div>
                    <div class="font-bold">판단받지 않는 AI에게 말한다</div>
                </button>
            </div>
            <button onclick="nextStep(4)" id="next3" disabled class="w-full mt-8 py-4 bg-slate-200 text-slate-400 rounded-2xl font-bold transition-all">다음</button>
        </div>

        <div id="step4" class="step glass-card p-8">
            <h3 class="text-xl font-bold mb-6 text-center">가장 큰 <span class="text-indigo-600">이유</span>는 무엇인가요?</h3>
            <div id="reason-container" class="space-y-3"></div>
            <button onclick="nextStep(5)" id="next4" disabled class="w-full mt-8 py-4 bg-slate-200 text-slate-400 rounded-2xl font-bold transition-all">결과 보기</button>
        </div>

        <div id="step5" class="step glass-card p-6">
            <div class="text-center mb-6">
                <div class="inline-block px-4 py-1 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold mb-2">
                    총 <span id="total-count">0</span>명의 친구 참여 중
                </div>
                <h3 class="text-2xl font-bold gradient-text">실시간 설문 통계</h3>
            </div>
            <div class="mb-8"><canvas id="resultChart" width="400" height="400"></canvas></div>
            <div class="p-4 bg-slate-50 rounded-xl mb-4">
                <div class="text-xs font-bold text-slate-400 mb-1 text-center">나의 선택 요약</div>
                <div id="my-choice-summary" class="font-bold text-indigo-600 text-center"></div>
            </div>
            <button onclick="location.reload()" class="w-full py-3 border-2 border-indigo-100 text-indigo-600 rounded-2xl font-bold">다시 하기</button>
        </div>
    </main>

    <script>
        let currentStep = 1;
        let selections = { q1: null, q2: null, q3: null };
        let mockStats = { offline: 14, chatbot: 17 };
        const reasons = {
            offline: ["직접적인 위로를 받고 싶어서", "전문적인 느낌이 들어서", "표정이나 반응을 볼 수 있어서"],
            chatbot: ["판단받는 기분이 안 들어서", "익명성이 보장돼서", "말하기 힘든 비밀이라서"]
        };

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            currentStep = step;
            document.getElementById('step-indicator').innerText = step + ' / 5';
            document.getElementById('progress-fill').style.width = (step * 20) + '%';
            if(step === 4) renderReasons();
            if(step === 5) showResults();
        }

        function selectOption(q, val) {
            selections[q] = val;
            const buttons = document.querySelectorAll('.' + q + '-opt');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const nextBtn = document.getElementById('next' + currentStep);
            if(nextBtn) {
                nextBtn.disabled = false;
                nextBtn.classList.replace('bg-slate-200', 'bg-indigo-600');
                nextBtn.classList.replace('text-slate-400', 'text-white');
            }
        }

        function renderReasons() {
            const container = document.getElementById('reason-container');
            container.innerHTML = '';
            reasons[selections.q1].forEach((text, idx) => {
                const btn = document.createElement('button');
                btn.className = 'q3-opt btn-select w-full p-4 text-left bg-white rounded-xl shadow-sm border border-slate-100 text-sm';
                btn.innerText = text;
                btn.onclick = () => selectOption('q3', idx);
                container.appendChild(btn);
            });
        }

        function showResults() {
            mockStats[selections.q1]++;
            document.getElementById('total-count').innerText = mockStats.offline + mockStats.chatbot;
            document.getElementById('my-choice-summary').innerText = (selections.q1 === 'offline' ? '대면 상담' : '챗봇 상담') + " 선호";
            new Chart(document.getElementById('resultChart'), {
                type: 'doughnut',
                data: {
                    labels: ['대면 상담', 'AI 챗봇'],
                    datasets: [{ data: [mockStats.offline, mockStats.chatbot], backgroundColor: ['#6366f1', '#a855f7'], borderWidth: 0 }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
